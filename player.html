<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ME LIVE Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    body{
      margin:0;
      background:#000;
      color:#fff;
      font-family:Arial,sans-serif;
    }

    .topbar{
      position:fixed;
      top:10px;
      left:10px;
      right:10px;
      z-index:9999;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .back-btn{
      background:#00ffcc;
      color:#000;
      border:none;
      padding:10px 15px;
      border-radius:8px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    .channel-title{
      background:rgba(0,0,0,0.6);
      padding:8px 14px;
      border-radius:8px;
      font-size:15px;
      font-weight:bold;
      color:#00ffcc;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:70%;
      text-align:right;
    }

    .video-wrap{
      width:100%;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#000;
    }

    video{
      width:100%;
      height:100vh;
      background:#000;
    }

    .error-msg{
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(255,0,0,0.85);
      color:#fff;
      padding:10px 16px;
      border-radius:8px;
      font-size:14px;
      display:none;
      z-index:9999;
    }

    @media(max-width:700px){
      .back-btn{
        padding:8px 12px;
        font-size:14px;
      }

      .channel-title{
        font-size:13px;
        max-width:60%;
      }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <button class="back-btn" onclick="goBack()">⬅ Back</button>
    <div class="channel-title" id="channelTitle">Loading...</div>
  </div>

  <div class="video-wrap">
    <video id="video" controls autoplay playsinline></video>
  </div>

  <div class="error-msg" id="errorMsg">Stream failed to load</div>

  <script>
    function goBack(){
      window.history.back();
    }

    const params = new URLSearchParams(window.location.search);
    const url = params.get("url");
    const name = params.get("name") || "ME LIVE";

    document.getElementById("channelTitle").textContent = decodeURIComponent(name);

    const video = document.getElementById("video");
    const errorMsg = document.getElementById("errorMsg");

    function showError(msg){
      errorMsg.textContent = msg;
      errorMsg.style.display = "block";
    }

    if(url){
      const decodedUrl = decodeURIComponent(url);

      if(Hls.isSupported()){
        const hls = new Hls();

        hls.loadSource(decodedUrl);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function() {
          video.play().catch(()=>{});
        });

        hls.on(Hls.Events.ERROR, function(event, data) {
          if(data.fatal){
            showError("Stream failed to load");
          }
        });

      } else if(video.canPlayType("application/vnd.apple.mpegurl")){
        video.src = decodedUrl;
        video.play().catch(()=>{});
      } else {
        video.src = decodedUrl;
      }

      video.addEventListener("error", function(){
        showError("Video playback error");
      });

    } else {
      showError("No stream URL found");
    }
  </script>

</body>
</html>
