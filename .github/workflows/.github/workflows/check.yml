name: Update Active IPTV

on:
  schedule:
    - cron: '0 * * * *'   # প্রতি ১ ঘণ্টা
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Checker
        run: node checker.js

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add active.m3u

          git diff --cached --quiet || git commit -m "Auto update active channels"

          git push
